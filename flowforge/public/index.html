<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlowForge - 工作流自动化</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-tertiary: #334155;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #3b82f6;
            --success: #22c55e;
            --warning: #f59e0b;
            --error: #ef4444;
        }
        
        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
        }
        
        .sidebar {
            background-color: var(--bg-secondary);
        }
        
        .workflow-card {
            background-color: var(--bg-secondary);
            border: 1px solid var(--bg-tertiary);
            transition: all 0.2s;
        }
        
        .workflow-card:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
        }
        
        .status-active {
            background-color: rgba(34, 197, 94, 0.2);
            color: #22c55e;
        }
        
        .status-inactive {
            background-color: rgba(148, 163, 184, 0.2);
            color: #94a3b8;
        }
        
        .node-item {
            background-color: var(--bg-tertiary);
            border: 2px solid transparent;
            cursor: grab;
        }
        
        .node-item:hover {
            border-color: var(--accent);
        }
        
        .modal {
            background-color: rgba(0, 0, 0, 0.8);
        }
        
        .modal-content {
            background-color: var(--bg-secondary);
        }
    </style>
</head>
<body class="h-screen overflow-hidden">
    <div class="flex h-full">
        <!-- Sidebar -->
        <aside class="sidebar w-64 flex flex-col border-r border-gray-700">
            <div class="p-6">
                <h1 class="text-2xl font-bold flex items-center gap-2">
                    <i class="fas fa-project-diagram text-blue-500"></i>
                    FlowForge
                </h1>
                <p class="text-sm mt-1" style="color: var(--text-secondary)">工作流自动化</p>
            </div>
            
            <nav class="flex-1 px-4">
                <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-lg mb-2 transition-colors" 
                   style="background-color: var(--bg-tertiary)">
                    <i class="fas fa-list"></i>
                    <span>工作流列表</span>
                </a>
                <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-lg mb-2 transition-colors hover:opacity-80">
                    <i class="fas fa-history"></i>
                    <span>执行历史</span>
                </a>
                <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-lg mb-2 transition-colors hover:opacity-80">
                    <i class="fas fa-plug"></i>
                    <span>连接器</span>
                </a>
            </nav>
            
            <div class="p-4 border-t border-gray-700">
                <button onclick="openCreateModal()" class="w-full btn-primary text-white py-3 rounded-lg flex items-center justify-center gap-2 hover:opacity-90">
                    <i class="fas fa-plus"></i>
                    新建工作流
                </button>
            </div>
        </aside>
        
        <!-- Main Content -->
        <main class="flex-1 flex flex-col" style="background-color: var(--bg-primary)">
            <!-- Header -->
            <header class="border-b px-6 py-4" style="background-color: var(--bg-secondary); border-color: var(--bg-tertiary)">
                <div class="flex items-center justify-between">
                    <h2 class="text-xl font-bold">工作流列表</h2>
                    <div class="flex items-center gap-4">
                        <span class="text-sm" style="color: var(--text-secondary)">
                            <i class="fas fa-circle text-green-500 mr-1"></i>
                            运行中: <span id="active-count">0</span>
                        </span>
                        <span class="text-sm" style="color: var(--text-secondary)">
                            总计: <span id="total-count">0</span>
                        </span>
                    </div>
                </div>
            </header>
            
            <!-- Workflows Grid -->
            <div id="workflows-container" class="flex-1 overflow-auto p-6">
                <div id="workflows-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                    <!-- Workflows will be loaded here -->
                </div>
            </div>
        </main>
    </div>
    
    <!-- Create/Edit Modal -->
    <div id="workflow-modal" class="modal hidden fixed inset-0 flex items-center justify-center z-50">
        <div class="modal-content rounded-xl p-6 w-full max-w-4xl max-h-[90vh] overflow-auto">
            <div class="flex justify-between items-center mb-6">
                <h2 id="modal-title" class="text-xl font-bold">新建工作流</h2>
                <button onclick="closeModal()" style="color: var(--text-secondary)" class="hover:opacity-80">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
            
            <input type="hidden" id="workflow-id">
            
            <!-- Basic Info -->
            <div class="mb-6">
                <label class="block text-sm font-medium mb-2" style="color: var(--text-secondary)">名称</label>
                <input type="text" id="workflow-name" placeholder="输入工作流名称..."
                       class="w-full px-4 py-2 rounded-lg focus:outline-none focus:ring-2"
                       style="background-color: var(--bg-tertiary); color: var(--text-primary); border: 1px solid var(--bg-tertiary)">
            </div>
            
            <div class="mb-6">
                <label class="block text-sm font-medium mb-2" style="color: var(--text-secondary)">描述</label>
                <input type="text" id="workflow-desc" placeholder="输入工作流描述..."
                       class="w-full px-4 py-2 rounded-lg focus:outline-none focus:ring-2"
                       style="background-color: var(--bg-tertiary); color: var(--text-primary); border: 1px solid var(--bg-tertiary)">
            </div>
            
            <!-- Trigger -->
            <div class="mb-6">
                <label class="block text-sm font-medium mb-2" style="color: var(--text-secondary)">触发器</label>
                <select id="workflow-trigger" onchange="onTriggerChange(this.value)"
                        class="w-full px-4 py-2 rounded-lg focus:outline-none"
                        style="background-color: var(--bg-tertiary); color: var(--text-primary); border: 1px solid var(--bg-tertiary)">
                    <option value="manual">手动触发</option>
                    <option value="cron">定时触发 (Cron)</option>
                    <option value="webhook">Webhook</option>
                </select>
                <div id="cron-config" class="mt-2 hidden">
                    <input type="text" id="cron-expression" placeholder="*/5 * * * * (每5分钟)"
                           class="w-full px-4 py-2 rounded-lg focus:outline-none font-mono text-sm"
                           style="background-color: var(--bg-tertiary); color: var(--text-primary); border: 1px solid var(--bg-tertiary)">
                    <p class="text-xs mt-1" style="color: var(--text-secondary)">Cron 表达式格式: 分 时 日 月 周</p>
                </div>
            </div>
            
            <!-- Nodes -->
            <div class="mb-6">
                <label class="block text-sm font-medium mb-2" style="color: var(--text-secondary)">执行节点</label>
                <div id="nodes-list" class="space-y-2 mb-4">
                    <!-- Nodes will be added here -->
                </div>
                <button onclick="addNode()" class="w-full py-2 rounded-lg border border-dashed hover:opacity-80"
                        style="border-color: var(--text-secondary); color: var(--text-secondary)">
                    <i class="fas fa-plus mr-2"></i>添加节点
                </button>
            </div>
            
            <div class="flex justify-end gap-3">
                <button onclick="closeModal()" style="color: var(--text-secondary)" class="px-4 py-2 rounded-lg hover:opacity-80">取消</button>
                <button onclick="saveWorkflow()" class="px-6 py-2 btn-primary text-white rounded-lg hover:opacity-90">保存</button>
            </div>
        </div>
    </div>
    
    <!-- Node Type Selector -->
    <div id="node-selector" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="modal-content rounded-xl p-6 w-full max-w-md">
            <h3 class="text-lg font-bold mb-4">选择节点类型</h3>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="selectNodeType('shell')" class="node-item p-4 rounded-lg text-left hover:opacity-80">
                    <i class="fas fa-terminal text-blue-400 mb-2"></i>
                    <div class="font-medium">Shell 命令</div>
                    <div class="text-xs" style="color: var(--text-secondary)">执行系统命令</div>
                </button>
                <button onclick="selectNodeType('http')" class="node-item p-4 rounded-lg text-left hover:opacity-80">
                    <i class="fas fa-globe text-green-400 mb-2"></i>
                    <div class="font-medium">HTTP 请求</div>
                    <div class="text-xs" style="color: var(--text-secondary)">调用 API 接口</div>
                </button>
                <button onclick="selectNodeType('delay')" class="node-item p-4 rounded-lg text-left hover:opacity-80">
                    <i class="fas fa-clock text-yellow-400 mb-2"></i>
                    <div class="font-medium">延迟等待</div>
                    <div class="text-xs" style="color: var(--text-secondary)">等待指定时间</div>
                </button>
                <button onclick="selectNodeType('log')" class="node-item p-4 rounded-lg text-left hover:opacity-80">
                    <i class="fas fa-file-alt text-purple-400 mb-2"></i>
                    <div class="font-medium">日志记录</div>
                    <div class="text-xs" style="color: var(--text-secondary)">输出日志信息</div>
                </button>
            </div>
            <button onclick="closeNodeSelector()" class="w-full mt-4 py-2 rounded-lg hover:opacity-80" style="background-color: var(--bg-tertiary)">取消</button>
        </div>
    </div>
    
    <script>
        const API_URL = 'http://localhost:3001/api';
        let currentNodes = [];
        
        // Load workflows
        async function loadWorkflows() {
            try {
                const response = await fetch(`${API_URL}/workflows`);
                const workflows = await response.json();
                displayWorkflows(workflows);
                updateStats(workflows);
            } catch (error) {
                console.error('Error loading workflows:', error);
            }
        }
        
        function displayWorkflows(workflows) {
            const container = document.getElementById('workflows-list');
            
            if (workflows.length === 0) {
                container.innerHTML = `
                    <div class="col-span-full text-center py-12" style="color: var(--text-secondary)">
                        <i class="fas fa-project-diagram text-4xl mb-4"></i>
                        <p>还没有工作流，创建一个吧！</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = workflows.map(wf => `
                <div class="workflow-card rounded-xl p-5 cursor-pointer" onclick="editWorkflow('${wf.id}')">
                    <div class="flex items-start justify-between mb-3">
                        <h3 class="font-bold text-lg">${escapeHtml(wf.name)}</h3>
                        <span class="text-xs px-2 py-1 rounded ${wf.status === 'active' ? 'status-active' : 'status-inactive'}">
                            ${wf.status === 'active' ? '运行中' : '已停止'}
                        </span>
                    </div>
                    <p class="text-sm mb-4 line-clamp-2" style="color: var(--text-secondary)">${escapeHtml(wf.description || '无描述')}</p>
                    <div class="flex items-center justify-between text-sm" style="color: var(--text-secondary)">
                        <span><i class="fas fa-cube mr-1"></i>${wf.nodes.length} 个节点</span>
                        <span><i class="fas fa-play mr-1"></i>${(wf.executions || []).length} 次执行</span>
                    </div>
                    <div class="flex gap-2 mt-4">
                        <button onclick="event.stopPropagation(); runWorkflow('${wf.id}')" 
                                class="flex-1 py-2 rounded-lg text-sm btn-primary text-white hover:opacity-90">
                            <i class="fas fa-play mr-1"></i>运行
                        </button>
                        <button onclick="event.stopPropagation(); toggleWorkflow('${wf.id}', '${wf.status}')" 
                                class="px-3 py-2 rounded-lg text-sm hover:opacity-80" style="background-color: var(--bg-tertiary)">
                            <i class="fas fa-${wf.status === 'active' ? 'pause' : 'play'}"></i>
                        </button>
                        <button onclick="event.stopPropagation(); deleteWorkflow('${wf.id}')" 
                                class="px-3 py-2 rounded-lg text-sm hover:opacity-80 text-red-400" style="background-color: var(--bg-tertiary)">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                </div>
            `).join('');
        }
        
        function updateStats(workflows) {
            document.getElementById('active-count').textContent = workflows.filter(w => w.status === 'active').length;
            document.getElementById('total-count').textContent = workflows.length;
        }
        
        // Modal functions
        function openCreateModal() {
            document.getElementById('workflow-modal').classList.remove('hidden');
            document.getElementById('modal-title').textContent = '新建工作流';
            document.getElementById('workflow-id').value = '';
            document.getElementById('workflow-name').value = '';
            document.getElementById('workflow-desc').value = '';
            document.getElementById('workflow-trigger').value = 'manual';
            document.getElementById('cron-config').classList.add('hidden');
            currentNodes = [];
            renderNodes();
        }
        
        async function editWorkflow(id) {
            try {
                const response = await fetch(`${API_URL}/workflows/${id}`);
                const wf = await response.json();
                
                document.getElementById('workflow-modal').classList.remove('hidden');
                document.getElementById('modal-title').textContent = '编辑工作流';
                document.getElementById('workflow-id').value = wf.id;
                document.getElementById('workflow-name').value = wf.name;
                document.getElementById('workflow-desc').value = wf.description || '';
                document.getElementById('workflow-trigger').value = wf.trigger.type;
                
                if (wf.trigger.type === 'cron') {
                    document.getElementById('cron-config').classList.remove('hidden');
                    document.getElementById('cron-expression').value = wf.trigger.cron || '';
                }
                
                currentNodes = wf.nodes || [];
                renderNodes();
            } catch (error) {
                console.error('Error loading workflow:', error);
            }
        }
        
        function closeModal() {
            document.getElementById('workflow-modal').classList.add('hidden');
        }
        
        function onTriggerChange(type) {
            document.getElementById('cron-config').classList.toggle('hidden', type !== 'cron');
        }
        
        // Node functions
        function addNode() {
            document.getElementById('node-selector').classList.remove('hidden');
        }
        
        function closeNodeSelector() {
            document.getElementById('node-selector').classList.add('hidden');
        }
        
        function selectNodeType(type) {
            const node = {
                id: Date.now().toString(),
                type,
                config: {}
            };
            
            if (type === 'shell') {
                node.config.command = '';
            } else if (type === 'http') {
                node.config = { url: '', method: 'GET', headers: {}, body: '' };
            } else if (type === 'delay') {
                node.config.duration = 5;
            } else if (type === 'log') {
                node.config.message = '';
            }
            
            currentNodes.push(node);
            renderNodes();
            closeNodeSelector();
        }
        
        function renderNodes() {
            const container = document.getElementById('nodes-list');
            container.innerHTML = currentNodes.map((node, index) => `
                <div class="flex items-center gap-3 p-3 rounded-lg" style="background-color: var(--bg-tertiary)">
                    <span class="text-sm" style="color: var(--text-secondary)">${index + 1}</span>
                    <i class="fas fa-${getNodeIcon(node.type)}"></i>
                    <span class="flex-1">${getNodeLabel(node.type)}</span>
                    <button onclick="removeNode(${index})" class="text-red-400 hover:opacity-80">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
            `).join('');
        }
        
        function getNodeIcon(type) {
            const icons = { shell: 'terminal', http: 'globe', delay: 'clock', log: 'file-alt' };
            return icons[type] || 'cube';
        }
        
        function getNodeLabel(type) {
            const labels = { shell: 'Shell 命令', http: 'HTTP 请求', delay: '延迟等待', log: '日志记录' };
            return labels[type] || type;
        }
        
        function removeNode(index) {
            currentNodes.splice(index, 1);
            renderNodes();
        }
        
        // CRUD operations
        async function saveWorkflow() {
            const id = document.getElementById('workflow-id').value;
            const name = document.getElementById('workflow-name').value.trim();
            const description = document.getElementById('workflow-desc').value.trim();
            const triggerType = document.getElementById('workflow-trigger').value;
            
            if (!name) {
                alert('请输入工作流名称');
                return;
            }
            
            if (currentNodes.length === 0) {
                alert('请至少添加一个执行节点');
                return;
            }
            
            const trigger = { type: triggerType };
            if (triggerType === 'cron') {
                trigger.cron = document.getElementById('cron-expression').value.trim();
                if (!trigger.cron) {
                    alert('请输入 Cron 表达式');
                    return;
                }
            }
            
            const workflow = { name, description, trigger, nodes: currentNodes };
            
            try {
                const url = id ? `${API_URL}/workflows/${id}` : `${API_URL}/workflows`;
                const method = id ? 'PUT' : 'POST';
                
                const response = await fetch(url, {
                    method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(workflow)
                });
                
                if (response.ok) {
                    closeModal();
                    loadWorkflows();
                } else {
                    const error = await response.json();
                    alert(error.error || '保存失败');
                }
            } catch (error) {
                console.error('Error saving workflow:', error);
                alert('保存失败');
            }
        }
        
        async function runWorkflow(id) {
            try {
                const response = await fetch(`${API_URL}/workflows/${id}/run`, { method: 'POST' });
                if (response.ok) {
                    alert('工作流已开始执行');
                    loadWorkflows();
                }
            } catch (error) {
                console.error('Error running workflow:', error);
            }
        }
        
        async function toggleWorkflow(id, currentStatus) {
            const action = currentStatus === 'active' ? 'deactivate' : 'activate';
            try {
                const response = await fetch(`${API_URL}/workflows/${id}/${action}`, { method: 'POST' });
                if (response.ok) {
                    loadWorkflows();
                }
            } catch (error) {
                console.error('Error toggling workflow:', error);
            }
        }
        
        async function deleteWorkflow(id) {
            if (!confirm('确定要删除这个工作流吗？')) return;
            
            try {
                const response = await fetch(`${API_URL}/workflows/${id}`, { method: 'DELETE' });
                if (response.ok) {
                    loadWorkflows();
                }
            } catch (error) {
                console.error('Error deleting workflow:', error);
            }
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadWorkflows();
        });
    </script>
</body>
</html>
